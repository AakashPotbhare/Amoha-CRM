name: CI — Test Suite

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch so PRs don't queue up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Backend unit tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-unit-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Amoha Pathfinder/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 'Amoha Pathfinder/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --ci --coverage --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key
          JWT_EXPIRES_IN: 1h
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_NAME: recruithub_test

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-coverage
          path: Amoha Pathfinder/backend/coverage/
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Backend integration tests
# ─────────────────────────────────────────────────────────────────────────────
  backend-integration-tests:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit-tests

    defaults:
      run:
        working-directory: Amoha Pathfinder/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 'Amoha Pathfinder/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration -- --ci --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key
          JWT_EXPIRES_IN: 1h
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_NAME: recruithub_test

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-integration-results
          path: Amoha Pathfinder/backend/coverage/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Frontend unit tests (Vitest)
# ─────────────────────────────────────────────────────────────────────────────
  frontend-unit-tests:
    name: Frontend — Unit Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Amoha Pathfinder/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 'Amoha Pathfinder/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest in run mode
        run: npm run test -- --run --reporter=verbose --coverage
        env:
          NODE_ENV: test
          # Vite does not require DB credentials; set VITE_ vars if the app reads them
          VITE_API_BASE_URL: http://localhost:4000

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-unit-coverage
          path: Amoha Pathfinder/frontend/coverage/
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: E2E tests (Playwright)
# ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright — Chromium)
    runs-on: ubuntu-latest
    # Only run after unit test jobs pass
    needs:
      - backend-unit-tests
      - frontend-unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node / deps for backend ──────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: Amoha Pathfinder/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: Amoha Pathfinder/frontend
        run: npm ci

      - name: Install E2E dependencies
        working-directory: Amoha Pathfinder/e2e
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        working-directory: Amoha Pathfinder/e2e
        run: npx playwright install chromium --with-deps

      # ── Start backend server (mocked DB) ────────────────────────────────
      - name: Start backend server
        working-directory: Amoha Pathfinder/backend
        run: node src/app.js &
        env:
          NODE_ENV: test
          PORT: '4000'
          JWT_SECRET: ci-e2e-secret-key
          JWT_EXPIRES_IN: 4h
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_NAME: recruithub_test
          CORS_ORIGIN: http://localhost:8080

      # ── Start frontend dev server ────────────────────────────────────────
      - name: Start frontend dev server
        working-directory: Amoha Pathfinder/frontend
        run: npm run dev -- --host 0.0.0.0 --port 8080 &
        env:
          VITE_API_BASE_URL: http://localhost:4000

      # ── Wait for both servers to be ready ────────────────────────────────
      - name: Wait for backend (port 4000)
        uses: iFaxity/wait-on-action@v1
        with:
          resource: http://localhost:4000/health
          timeout: 60000
          interval: 2000

      - name: Wait for frontend (port 8080)
        uses: iFaxity/wait-on-action@v1
        with:
          resource: http://localhost:8080
          timeout: 60000
          interval: 2000

      # ── Run Playwright ───────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        working-directory: Amoha Pathfinder/e2e
        run: npm test
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      # ── Upload artefacts on failure ──────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Amoha Pathfinder/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots / videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: Amoha Pathfinder/e2e/test-results/
          retention-days: 7
